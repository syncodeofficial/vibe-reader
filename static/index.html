<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vibe Reader — read the room</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #10131f;
    --panel: #191d2e;
    --panel-2: #1f2438;
    --line: #2b3150;
    --ink: #eef0f8;
    --muted: #9aa0b4;
    --amber: #ffb347;   /* energy / vibe */
    --pink: #ff5d8f;    /* questions / live */
    --cyan: #5fd0e0;    /* topics */
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(1200px 600px at 80% -10%, #1a2036 0%, var(--bg) 55%);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    min-height: 100vh;
    padding: clamp(16px, 4vw, 48px);
  }
  .wrap { max-width: 1080px; margin: 0 auto; }

  header { margin-bottom: 28px; }
  .eyebrow {
    font-family: "Space Mono", monospace;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--amber); margin: 0 0 8px;
  }
  h1 {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700; font-size: clamp(30px, 5vw, 48px);
    line-height: 1.02; margin: 0; letter-spacing: -0.02em;
  }
  h1 .live {
    color: var(--pink);
    position: relative; padding-left: 22px;
  }
  h1 .live::before {
    content: ""; position: absolute; left: 0; top: 50%;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--pink); transform: translateY(-50%);
    box-shadow: 0 0 0 0 rgba(255,93,143,.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,93,143,.5); }
    70% { box-shadow: 0 0 0 10px rgba(255,93,143,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,93,143,0); }
  }
  .sub { color: var(--muted); margin: 12px 0 0; max-width: 52ch; }

  .grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 20px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
  }
  .panel h2 {
    font-family: "Space Mono", monospace;
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); margin: 0 0 14px; font-weight: 400;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 6px; }
  input, textarea {
    width: 100%; background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 12px; font: inherit; resize: vertical;
  }
  textarea { font-family: "Space Mono", monospace; font-size: 13px; line-height: 1.5; min-height: 220px; }
  input:focus, textarea:focus { outline: 2px solid var(--amber); outline-offset: 1px; border-color: transparent; }
  .field { margin-bottom: 16px; }

  button {
    width: 100%; cursor: pointer;
    font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 16px;
    color: #1a1206; background: var(--amber);
    border: 0; border-radius: 10px; padding: 13px;
    transition: transform .08s ease, filter .15s ease;
  }
  button:hover { filter: brightness(1.06); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: .55; cursor: progress; }
  button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* ---- readout (the signature element) ---- */
  .vibe-readout {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 22px; margin-bottom: 18px;
  }
  .vibe-word {
    font-family: "Space Grotesk", sans-serif; font-weight: 700;
    font-size: clamp(34px, 6vw, 56px); line-height: 1; letter-spacing: -0.03em;
    color: var(--amber); text-transform: lowercase; margin: 0;
  }
  .vibe-read { color: var(--muted); margin: 10px 0 16px; }
  .meter { height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; border: 1px solid var(--line); }
  .meter > span { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--pink), var(--amber)); transition: width .6s ease; }

  .stack > * + * { margin-top: 10px; }
  .q {
    background: var(--bg); border: 1px solid var(--line);
    border-left: 3px solid var(--pink); border-radius: 10px; padding: 13px 14px;
  }
  .q .asker { font-family: "Space Mono", monospace; font-size: 12px; color: var(--pink); }
  .q .text { margin: 4px 0 6px; font-weight: 500; }
  .q .why { font-size: 13px; color: var(--muted); }

  .topics { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-family: "Space Mono", monospace; font-size: 12px;
    border: 1px solid var(--line); border-radius: 99px; padding: 6px 11px;
    color: var(--cyan); display: inline-flex; gap: 7px; align-items: center;
  }
  .chip .heat { letter-spacing: 1px; }

  .move {
    background: var(--bg); border: 1px dashed var(--amber);
    border-radius: 10px; padding: 14px; color: var(--ink);
  }
  .move .tag { font-family: "Space Mono", monospace; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--amber); display: block; margin-bottom: 6px; }

  .empty { color: var(--muted); font-size: 14px; }
  .error { border-left-color: var(--pink); color: #ffc2d2; }
  .section + .section { margin-top: 20px; }
  .section h3 { font-family: "Space Mono", monospace; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin: 0 0 9px; font-weight: 400; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">live chat intelligence</p>
    <h1>Read the <span class="live">room</span>.</h1>
    <p class="sub">Paste a slice of live chat. Get back the mood, the questions actually worth answering, what the room keeps circling, and the next move — in the time it takes to sip coffee.</p>
  </header>

  <div class="grid">
    <section class="panel">
      <h2>Input</h2>
      <div class="field">
        <label for="topic">What's the stream about?</label>
        <input id="topic" value="Building a SaaS live with Next.js and Supabase" />
      </div>
      <div class="field">
        <label for="chat">Chat log <span style="opacity:.6">(one message per line: name: message)</span></label>
        <textarea id="chat">nightowl_92: wait how did you set up the OBS scene??
pixelpusher: this is so clean lol
dev_marta: can you show the supabase RLS policy again? i got lost
greg.exe: W stream
pixelpusher: +1 on the RLS thing, mine keeps blocking everything
hypebot: 🔥🔥🔥
sam_builds: are you deploying this on vercel or fly?
quietkoala: been here 2 hours, learned more than a whole course
dev_marta: also what theme is that in the editor
greg.exe: do you ever use the free tier in prod?</textarea>
      </div>
      <button id="go">Read the room</button>
    </section>

    <section class="panel" aria-live="polite">
      <h2>Readout</h2>
      <div id="out">
        <p class="empty">Hit “Read the room” and the readout shows up here.</p>
      </div>
    </section>
  </div>
</div>

<script>
  const heatBar = (n) => "▮".repeat(n) + "▯".repeat(5 - n);

  async function readRoom() {
    const btn = document.getElementById("go");
    const out = document.getElementById("out");
    const topic = document.getElementById("topic").value.trim();
    const lines = document.getElementById("chat").value
      .split("\n").map(l => l.trim()).filter(Boolean);

    const messages = lines.map(line => {
      const i = line.indexOf(":");
      return i === -1
        ? { author: "anon", text: line }
        : { author: line.slice(0, i).trim(), text: line.slice(i + 1).trim() };
    });

    if (!messages.length) {
      out.innerHTML = '<div class="q error">Add at least one chat line first.</div>';
      return;
    }

    btn.disabled = true; btn.textContent = "Reading…";
    out.innerHTML = '<p class="empty">Listening to the room…</p>';

    try {
      const res = await fetch("/read", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ stream_topic: topic, messages })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || ("Request failed (" + res.status + ")"));
      }
      render(await res.json());
    } catch (e) {
      out.innerHTML = '<div class="q error">' + e.message + "</div>";
    } finally {
      btn.disabled = false; btn.textContent = "Read the room";
    }
  }

  function render(d) {
    const out = document.getElementById("out");
    const vibeHeat = Math.min(100, Math.max(20, (d.topics?.[0]?.heat || 3) * 20));

    const questions = (d.questions || []).map(q => `
      <div class="q">
        <div class="asker">@${escape(q.asker)}</div>
        <div class="text">${escape(q.question)}</div>
        <div class="why">${escape(q.why_it_lands)}</div>
      </div>`).join("") || '<p class="empty">No real questions in this batch.</p>';

    const topics = (d.topics || []).map(t => `
      <span class="chip">${escape(t.label)} <span class="heat">${heatBar(t.heat)}</span></span>
    `).join("") || '<p class="empty">Nothing the room keeps circling yet.</p>';

    out.innerHTML = `
      <div class="vibe-readout">
        <p class="vibe-word">${escape(d.vibe.word)}</p>
        <p class="vibe-read">${escape(d.vibe.read)}</p>
        <div class="meter"><span style="width:${vibeHeat}%"></span></div>
      </div>
      <div class="section"><h3>Questions worth answering</h3><div class="stack">${questions}</div></div>
      <div class="section"><h3>What the room is circling</h3><div class="topics">${topics}</div></div>
      <div class="section"><h3>The move</h3>
        <div class="move"><span class="tag">do this next</span>${escape(d.the_move)}</div>
      </div>`;
  }

  function escape(s) {
    return String(s ?? "").replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  document.getElementById("go").addEventListener("click", readRoom);
</script>
</body>
</html>
